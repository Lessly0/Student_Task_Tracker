<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
    <nav class="flex justify-around items-center py-3 sticky backdrop-blur bg-white/60 shadow-md top-0 z-50">
        <span class="text-2xl font-bold">ListTracker</span>
        <ul class="flex space-x-8">
            <li class="py-2 border-2 border-gray-600 rounded-full">Home</li>
            <li class="py-2 border-2 border-gray-600 rounded-full">How it works</li>
            <li class="py-2 border-2 border-gray-600 rounded-full">List</li>
        </ul>
    </nav>

    <section class="flex flex-col">
        <div class="home-content flex flex-col items-center gap-6 py-24 relative overflow-hidden min-h-screen justify-center text-white">
            <h1>Student List Tracker</h1>
            <p></p>
        </div>
        <div class="How it works flex flex-col justify-center mx-auto gap-6 py-24 w-[80%]">
            <h1>How it works</h1>
            <p></p>
            <span>Discover more</span>
        </div>
        <div class="List flex flex-col gap-4 w-[80%] mx-auto pb-24">
            <form action="">
                <label for="Task Name"></label>
                <input type="text">
                <label for="Due Date"></label>
                <input type="date">
                <button>Add Task</button>
            </form>
            <div class="List-display">
                <h2>Display Area</h2>
                <div class="grid grid-cols-1 lg: grid-cols-3">

                </div>
            </div>
        </div>
    </section>

    <footer class="flex justify-center bg-gray-600 py-8 bg-gray-300">
        <div class="flex">
            <span>ListTracker</span>
            <ul>
               <li>Home</li>
               <li>How it works</li>
               <li>List</li>
            </ul>
        </div>
        <p class="text-gray-300">&copy; 2024 Activities in Rwanda. All rights reserved.</p>
    </footer> 
</body>
</html>
